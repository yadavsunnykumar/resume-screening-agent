# render.yaml  (place at repo root)
services:
  - type: web
    name: resume-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # you'll enter this manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGINS
        sync: false        # you'll fill this after frontend is deployed

  - type: web
    name: resume-agent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false        # you'll fill this after backend is deployed